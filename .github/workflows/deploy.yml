name: Deploy Demo

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    name: Deploy backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Deploy mock backend
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --source backend \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --set-env-vars "MOCK_SERVICES=1,APP_ENV=production,PUBLIC_APP_URL=${{ vars.VITE_PUBLIC_APP_URL }},ALLOWED_ORIGINS=${{ vars.VITE_PUBLIC_APP_URL }},RAG_BACKEND=chroma"

  deploy-frontend:
    name: Deploy frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend
    env:
      VITE_DEMO_MODE: "1"
      VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
      VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL }}
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - name: Deploy hosting
        run: npx firebase-tools deploy --only hosting:devils --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive
